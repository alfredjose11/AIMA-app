<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find a Blood Donor — AIMA | SMYM Chirakkadavu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        /* ==========================================================================
           THEME STYLE SYSTEM CORE VARIABLES & ROOT METRICS
           ========================================================================== */
        :root {
            --bg-dark: #050507;
            --card-bg: rgba(14, 14, 18, 0.55);
            --primary-red: #ff3b42;
            --primary-red-hover: #e02d34;
            --text-white: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.55);
            --border-light: rgba(255, 255, 255, 0.06);
            --font-display: 'Playfair Display', serif;
            --font-body: 'Plus Jakarta Sans', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-white);
            font-family: var(--font-body);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Background Visual Frames */
        .static-image-backdrop {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -2; background-color: #000;
        }
        .static-image-backdrop img {
            width: 100%; height: 100%;
            object-fit: cover;
            object-position: right center;
        }
        .video-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(180deg, rgba(5,5,7,0.5) 0%, rgba(5,5,7,0.3) 50%, rgba(5,5,7,0.8) 100%);
            z-index: -1;
        }

        /* Navigation Layout */
        header.navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 6%;
            border-bottom: 1px solid var(--border-light);
            background: rgba(5, 5, 7, 0.3);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            position: sticky; top: 0; z-index: 99;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .logo i { font-size: 1.5rem; color: var(--primary-red); }
        .logo h3 { font-size: 1.35rem; font-weight: 800; letter-spacing: -0.02em; line-height: 1; text-transform: uppercase; }
        .logo h3 span { color: var(--primary-red); }
        .logo span { display: block; font-size: 0.6rem; font-weight: 600; color: var(--text-muted); letter-spacing: 0.12em; text-transform: uppercase; margin-top: 2px; }
        
        nav.links a {
            color: var(--text-white);
            text-decoration: none;
            font-size: 0.92rem;
            font-weight: 600;
            margin-left: 1.5rem;
            padding: 0.6rem 1.4rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 100px;
            background: rgba(255, 255, 255, 0.04);
            transition: all 0.2s ease;
        }
        nav.links a:hover { border-color: var(--primary-red); color: var(--primary-red); background: rgba(255, 59, 66, 0.05); }

        /* Forms Layout Wrapper */
        .page-wrap {
            max-width: 800px;
            margin: 0 auto;
            padding: 4rem 1.5rem 5rem;
            position: relative;
            z-index: 10;
        }
        .page-head { text-align: center; margin-bottom: 3rem; }
        .page-head h1 { font-family: var(--font-display); font-size: clamp(2.2rem, 5vw, 3.2rem); font-weight: 700; letter-spacing: -0.02em; margin-top: 0.5rem; }
        .page-head .eyebrow { color: var(--primary-red-hover); font-weight: 700; text-transform: uppercase; letter-spacing: 0.15em; font-size: 0.8rem; }
        .page-head p { color: var(--text-muted); font-size: 1.05rem; margin-top: 0.5rem; }

        form.card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-light);
            border-radius: 20px;
            padding: 3rem;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }
        .field { margin-bottom: 1.5rem; display: flex; flex-direction: column; }
        .field label { display: block; font-weight: 600; font-size: .82rem; text-transform: uppercase; color: rgba(255, 255, 255, 0.6); margin-bottom: .6rem; letter-spacing: 0.05em; }
        .field input, .field select {
            width: 100%; padding: 0.9rem 1.1rem; background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.12); border-radius: 12px; color: #fff; font-family: var(--font-body); font-size: 0.95rem; outline: none;
        }
        .field input:focus, .field select:focus { border-color: var(--primary-red); box-shadow: 0 0 0 3px rgba(255, 59, 66, 0.15); }
        .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }

        .btn-submit {
            width: 100%; background: var(--primary-red); color: #ffffff; border: none; padding: 1.1rem; border-radius: 12px; font-weight: 600; font-size: 1rem; cursor: pointer; font-family: var(--font-body); box-shadow: 0 8px 25px rgba(255, 59, 66, 0.25); transition: all 0.2s ease;
        }
        .btn-submit:hover { background: var(--primary-red-hover); transform: translateY(-2px); }

        .status-msg { margin-top: 1.5rem; padding: 1rem; border-radius: 10px; text-align: center; font-weight: 500; display: none; }
        .status-msg.show { display: block; }
        .status-msg.ok { color: #26e67e; background: rgba(38, 230, 126, 0.1); border: 1px solid rgba(38, 230, 126, 0.3); }
        .status-msg.err { color: #ff4d55; background: rgba(255, 77, 85, 0.1); border: 1px solid rgba(255, 77, 85, 0.3); }

        /* Dynamic Query Result Container Grid Layout */
        .results { margin-top: 2.5rem; display: grid; grid-template-columns: 1fr; gap: 1.2rem; }
        .donor-card {
            background: rgba(255,255,255,0.02); border: 1px solid var(--border-light); border-radius: 14px; padding: 1.2rem 1.8rem;
            display: flex; justify-content: space-between; align-items: center;
        }
        .donor-card .bg {
            background: rgba(255,59,66,0.15); color: #ff4d55; border: 1px solid rgba(255,59,66,0.3); width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 700; margin-right: 1.5rem; flex-shrink: 0;
        }
        .donor-info { display: flex; align-items: center; }
        .donor-name { font-size: 1.1rem; font-weight: 600; color: #fff; }
        .donor-meta { font-size: 0.85rem; color: rgba(255,255,255,0.5); }
        
        .btn-call {
            background: rgba(255, 255, 255, 0.05); color: #fff; border: 1px solid rgba(255, 255, 255, 0.15); padding: 0.6rem 1.4rem; border-radius: 8px; font-weight: 600; font-size: 0.88rem; text-decoration: none; transition: all 0.2s;
        }
        .btn-call:hover { background: #fff; color: #050507; }

        footer {
            text-align: center; padding: 2rem 1rem; border-top: 1px solid var(--border-light); font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.25em; color: rgba(255, 255, 255, 0.2); font-weight: 600; margin-top: 5rem;
        }

        @media (max-width: 650px) {
            header.navbar { padding: 1.2rem 1.5rem; }
            nav.links { display: none; }
            form.card { padding: 2rem 1.5rem; }
            .row2 { grid-template-columns: 1fr; gap: 0; }
            .donor-card { flex-direction: column; align-items: flex-start; gap: 1.2rem; }
            .btn-call { width: 100%; text-align: center; }
        }
    </style>
</head>
<body>

    <!-- ================= FIXED BACKDROP IMAGERY ================= -->
    <div class="static-image-backdrop">
        <img src="find.png" alt="Backdrop Element">
    </div>
    <div class="video-overlay"></div>

    <!-- ================= NAVIGATION HEADER ================= -->
    <header class="navbar">
        <div class="logo">
            <i class="fa-solid fa-droplet"></i>
            <div>
                <h3><a href="index.html" style="text-decoration:none; color:inherit;">aima<span>.</span></a></h3>
                <span>SMYM Chirakkadavu</span>
            </div>
        </div>
        <nav class="links">
            <a href="register.html">Become a Donor</a>
            <a href="find.html">Find a Donor</a>
        </nav>
    </header>

    <!-- ================= SEARCH MATRIX WORKSPACE ================= -->
    <div class="page-wrap">
      <div class="page-head">
        <div class="eyebrow">Search the network</div>
        <h1>Find a blood donor</h1>
        <p>Search by blood group and location to find available voluntary donors near you.</p>
      </div>

      <form class="card" id="searchForm">
        <div class="row2">
          <div class="field">
            <label for="blood_group">Blood Group</label>
            <select id="blood_group"></select>
          </div>
          <div class="field">
            <label for="country">Country</label>
            <input type="text" id="country" placeholder="India" value="India">
          </div>
        </div>

        <div class="row2">
          <div class="field">
            <label for="state">State</label>
            <input type="text" id="state" placeholder="e.g. Kerala" value="Kerala">
          </div>
          <div class="field">
            <label for="district">District</label>
            <input type="text" id="district" placeholder="e.g. Kottayam" value="Kottayam">
          </div>
        </div>

        <div class="field">
          <label for="city">City / Town / Local Unit</label>
          <input type="text" id="city" placeholder="e.g. Chirakkadavu">
        </div>

        <button type="submit" class="btn-submit">🔍 Search Active Dataset</button>
        <div class="status-msg" id="statusMsg"></div>
      </form>

      <div class="results" id="results"></div>
    </div>

    <footer>
        managed by smym chirakkadavu
    </footer>

    <!-- Core Database Dependencies[cite: 9] -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
    const SUPABASE_URL = "https://xpqeatcwykuqytcxbxmb.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_3m4Jq_qdtj761DqiUvYidA_KSemQn_K";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const BLOOD_GROUPS = ["A+", "A-", "B+", "B-", "AB+", "AB-", "O+", "O-"];

    (function populateDropdown() {
        const selectEl = document.getElementById("blood_group");
        if (!selectEl) return;
        selectEl.innerHTML = '<option value="">Any Group</option>';
        BLOOD_GROUPS.forEach(bg => {
            const opt = document.createElement("option");
            opt.value = bg; opt.textContent = bg; selectEl.appendChild(opt);
        });
    })();

    function showStatus(element, message, isOk) {
        element.textContent = message;
        element.className = "status-msg show " + (isOk ? "ok" : "err");
    }

    document.getElementById("searchForm").addEventListener("submit", async (e)=>{
      e.preventDefault();
      const statusMsg = document.getElementById("statusMsg");
      const resultsEl = document.getElementById("results");
      resultsEl.innerHTML = "";
      statusMsg.className = "status-msg";

      let query = supabaseClient.from("donors").select("*").eq("availability","Available");

      const bg = document.getElementById("blood_group").value;
      const country = document.getElementById("country").value.trim();
      const state = document.getElementById("state").value.trim();
      const district = document.getElementById("district").value.trim();
      const city = document.getElementById("city").value.trim();

      if(bg) query = query.eq("blood_group", bg);
      if(country) query = query.ilike("country", country);
      if(state) query = query.ilike("state", state);
      if(district) query = query.ilike("district", district);
      if(city) query = query.ilike("city", city);

      const { data, error } = await query.limit(50);

      if(error){
        showStatus(statusMsg, "Search failed: " + error.message, false);
        return;
      }

      if(!data || data.length===0){
        showStatus(statusMsg, "No matching donors found. Try widening your search.", false);
        return;
      }

      showStatus(statusMsg, `Found ${data.length} donor(s).`, true);

      data.forEach(d=>{
        const card = document.createElement("div");
        card.className = "donor-card";
        card.innerHTML = `
          <div class="donor-info">
            <div class="bg">${d.blood_group}</div>
            <div>
              <div class="donor-name">${d.full_name}</div>
              <div class="donor-meta">${[d.city, d.district, d.state].filter(Boolean).join(", ")}</div>
            </div>
          </div>
          <a class="btn-call" href="tel:${d.mobile}">Call</a>
        `;
        resultsEl.appendChild(card);
      });
    });
    </script>
</body>
</html>
